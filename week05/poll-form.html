<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Poll</title>
    <meta name="description" content="This is an example of HTML form for learning purposes">
    <meta name="author" content="Emmanuel Kachuchuru">
    <link rel="stylesheet" href="styles/poll-form.css">
</head>

<body>
    <header>
        <h1>WDD 130 | HTML Form-User Poll</h1>
    </header>

    <main>
        <form>

            <fieldset>
                <legend>Contact Information</legend>


                <div class="form-item column2">
                    <label for="fullname">Full name:</label>
                    <input type="text" id="full name" name="full name required">
                </div>

                <div class="form-item column2">
                    <label for="useremail">Email:</label>
                    <input type="email" id="usermail" name="useremail" required>
                </div>

            </fieldset>

            <fieldset>
                <legend>Questions</legend>


                <div class="form-item column1">
                    <label for="browser">What is your favorite internet browser:</label>
                    <Select name="browser" id="browser">
                        <option value="1">Chrome</option>
                        <option value="2">Safari</option>
                        <option value="3">Edge</option>
                        <option value="4">Bravo</option>
                        <option value="5">Other</option>
                    </Select>
                </div>

                <div class="form-item column1">
                    <label for="pet">Do you have a household pet?</label>
                    <input type="checkbox" id="pet" name="pet">
                </div>

                <div class="form-item">
                    <label for="feedback">List the places you have lived:</label>
                    <textarea id="feedback" name="feedback" rows="4"
                      placeholder="Stillwater Florida, Amsterdam Netherlands, Timbuktu Mali"></textarea>
                </div>
            </fieldset>

            <div class="submit-section">
                <button type="submit">Submit Poll</button>
            </div>

        </form>
    </main>

    <div class="footer-section">

        <footer>

            <p> &copy; 2026 HTML Form-User Poll Activity | Emmanuel Kachuchuru</p>
        </footer>
    </div>

</body>

</html>
